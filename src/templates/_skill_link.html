{% if skill != "No Skill" %}
<a class="skill" target="_blank" rel="noopener noreferrer"
    href="https://wiki.guildwars.com/wiki/{{ skill | replace(' ', '_') }}" data-tooltip="{{ skill }}">
    <img src="https://www.gw-memorial.net/img/skills-icon64/{{ skill | replace(' ', '_') }}">
</a>
{% endif %}

{% if skill == "No Skill" %}
 <a class="skill"><img src="https://www.gw-memorial.net/img/skills-icon64/0.png"></a>
{% endif %}

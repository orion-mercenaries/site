{% if skill != "No Skill" %}
{% with clean_skill = skill.replace('"', '').replace(' ', '_') %}
<a class="skill" target="_blank" rel="noopener noreferrer" href="https://wiki.guildwars.com/wiki/{{ clean_skill }}"
    data-tooltip="{{ skill }}">
    <img src="https://www.gw-memorial.net/img/skills-icon64/{{ clean_skill }}">
</a>
{% endwith %}
{% endif %}

{% if skill == "No Skill" %}
<a class="skill"><img src="https://www.gw-memorial.net/img/skills-icon64/0.png"></a>
{% endif %}
